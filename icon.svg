<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="8" fill="url(#bg)"/>
  <!-- 趋势曲线 -->
  <polyline points="8,48 16,40 24,44 32,20 40,28 48,12 56,16"
            fill="none" stroke="#00FF88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 第二个通道 -->
  <polyline points="8,52 16,36 24,48 32,30 40,38 48,22 56,20"
            fill="none" stroke="#4A90D9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- 网格 -->
  <line x1="8" y1="8" x2="8" y2="56" stroke="#ffffff20" stroke-width="0.5"/>
  <line x1="56" y1="8" x2="56" y2="56" stroke="#ffffff20" stroke-width="0.5"/>
  <line x1="8" y1="56" x2="56" y2="56" stroke="#ffffff20" stroke-width="0.5"/>
  <!-- 字母 M -->
  <text x="32" y="50" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffffff40">MD</text>
</svg>